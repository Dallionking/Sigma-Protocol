# GoReleaser configuration for Sigma CLI
# https://goreleaser.com
version: 2

project_name: sigma

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: sigma
    main: ./cmd/sigma
    binary: sigma
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: sigma
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: dallionking
    name: sigma-protocol
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Sigma CLI {{ .Version }}

    Platform-agnostic AI development workflow CLI.
  footer: |
    ---

    **Full Changelog**: https://github.com/dallionking/sigma-protocol/compare/{{ .PreviousTag }}...{{ .Tag }}

