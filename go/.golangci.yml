# golangci-lint configuration for Sigma CLI
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  go: '1.23'

linters:
  enable:
    # Default linters
    - errcheck      # Check for unchecked errors
    - gosimple      # Suggest code simplifications
    - govet         # Report suspicious constructs
    - ineffassign   # Detect unused variable assignments
    - staticcheck   # Static analysis
    - unused        # Check for unused code

    # Additional linters
    - gofmt         # Check formatting
    - goimports     # Check import ordering
    - gocritic      # Comprehensive Go linter
    - gosec         # Security checks
    - misspell      # Check for misspellings
    - unconvert     # Remove unnecessary conversions
    - prealloc      # Suggest preallocations
    - noctx         # Check for http.Request without context
    - bodyclose     # Check for unclosed HTTP response bodies
    - durationcheck # Check for duration multiplications
    - exportloopref # Check for exported loop variables
    - nilerr        # Check for nil error returns
    - errorlint     # Check error wrapping
    - makezero      # Check for slice initialization
    - predeclared   # Check for predeclared identifiers

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close

  govet:
    enable:
      - shadow

  goimports:
    local-prefixes: github.com/dallionking/sigma-protocol

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam

  gosec:
    excludes:
      - G104 # Unhandled errors (covered by errcheck)
      - G304 # File path provided as taint input (intentional for CLI)

  misspell:
    locale: US

  staticcheck:
    checks: ["all"]

issues:
  exclude-rules:
    # Exclude test files from certain checks
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - gocritic

    # Allow fmt.Printf in CLI commands
    - path: cmd/
      linters:
        - forbidigo

    # Allow long lines in generated code
    - path: generated
      linters:
        - lll

  max-issues-per-linter: 50
  max-same-issues: 3

  # Show all issues
  exclude-use-default: false

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
