#:schema https://developers.openai.com/codex/config-schema.json
# Sigma Protocol - Codex Production Configuration
#
# Project overrides:  .codex/config.toml
# User defaults:      ~/.codex/config.toml
# Skills:             .codex/skills/ (legacy: .agents/skills/)
#
# Reference: https://developers.openai.com/codex/config-basic/

# ── Model ────────────────────────────────────────────────────────────────
model = "gpt-5.3-codex"

# ── Defaults ─────────────────────────────────────────────────────────────
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "high"
web_search = "cached"
model_personality = "pragmatic"

# ── Feature Flags ────────────────────────────────────────────────────────
[features]
unified_exec = true
exec_policy = true
apply_patch_freeform = true

# ── Shell Environment ────────────────────────────────────────────────────
[shell_environment_policy]
inherit = "core"
include_only = [
  "PATH",
  "HOME",
  "NODE_PATH",
  "EDITOR",
  "SHELL",
  "TERM",
  "USER",
  "LANG",
  "LC_ALL",
  "GH_TOKEN",
  "NPM_TOKEN",
]

# ── Profiles ─────────────────────────────────────────────────────────────

[profiles.sigma-dev]
# Balanced dev workflow — default for daily development
approval_policy = "on-request"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"

[profiles.sigma-strict]
# Read-only code review and audit — no writes allowed
approval_policy = "untrusted"
model_reasoning_effort = "high"
sandbox_mode = "read-only"

[profiles.sigma-fast]
# Rapid prototyping — auto-approve unless failures
approval_policy = "on-failure"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

# ── MCP Servers ──────────────────────────────────────────────────────────
# Mirrors .mcp.json — Codex supports both stdio and HTTP/Streamable HTTP transport

# stdio servers (local process)
[mcp_servers.firecrawl]
command = "npx"
args = ["-y", "firecrawl-mcp"]

[mcp_servers.exa]
command = "npx"
args = ["-y", "@anthropic/exa-mcp-server"]

[mcp_servers.ref]
command = "npx"
args = ["-y", "@anthropic/ref-mcp-server"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@context7/mcp-server"]

[mcp_servers.task-master-ai]
command = "npx"
args = ["-y", "--package=task-master-ai", "task-master-ai"]

# HTTP/Streamable HTTP server
[mcp_servers.greptile]
type = "http"
url = "https://api.greptile.com/mcp"
bearer_token_env_var = "GREPTILE_API_KEY"
# Tool filtering: allow_tools = ["search-codebase"]
# Tool filtering: deny_tools = ["dangerous-tool"]

# ── MCP Server Timeouts ─────────────────────────────────────────────────
# Applies to all MCP servers unless overridden per-server
# startup_timeout_sec = 30
# tool_timeout_sec = 60

# ── Sandbox Network Access ───────────────────────────────────────────────
[sandbox_workspace_write]
network_access = true
